  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="650" cy="100" r="180" fill="#ffffff08"/>
  <circle cx="100" cy="500" r="120" fill="#ffffff08"/>
  <text x="400" y="280" text-anchor="middle" font-size="140">📍</text>
  <text x="400" y="400" text-anchor="middle" font-size="36" font-weight="bold" fill="white" filter="url(#shadow)">石达开铜像</text>
  <rect x="340" y="430" width="120" height="36" rx="18" fill="#ffffff33"/>
  <text x="400" y="455" text-anchor="middle" font-size="18" fill="white">港北区登龙桥路</text>
  <text x="780" y="580" text-anchor="end" font-size="14" fill="#ffffff55">贵港旅游</text>
